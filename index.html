<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>imumaze</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="hud">
      <div>
        <h1>imumaze</h1>
        <p id="status">箱を傾けて、ボールをゴールへ。</p>
      </div>
      <button id="newGame" type="button">新しい迷路</button>
    </header>

    <canvas id="game" aria-label="迷路ゲーム"></canvas>

    <section class="help">
      <p>スマートフォンでは端末を傾けて操作します。動かない場合は画面をドラッグしてください。</p>
      <div class="controls">
        <button id="motionPermission" type="button" hidden>傾き操作を有効にする</button>
        <button id="calibrateTilt" type="button">傾きを補正する</button>
        <button id="resetTilt" type="button">傾き補正を中止する</button>
      </div>
      <div class="telemetry" aria-live="polite">
        <p id="tiltMode">傾き補正: OFF</p>
        <p id="tiltRaw">現在値 g: x 0.00 / y 0.00 / z 0.00</p>
        <p id="tiltOffset">補正値 g: x 0.00 / y 0.00 / z 0.00</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
